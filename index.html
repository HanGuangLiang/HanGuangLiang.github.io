<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韵达动态码生成器 - 管理员专用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "Fangzheng Shusong", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #F5F8FF;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(21, 101, 192, 0.1);
            padding: 40px 30px;
            text-align: center;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #1565c0;
            margin-bottom: 30px;
        }
        .code-box {
            margin: 20px 0;
        }
        .dynamic-code {
            font-size: 60px;
            font-weight: bold;
            color: #dc0000;
            letter-spacing: 8px;
            margin: 15px 0;
            word-break: break-all;
        }
        .expire {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .countdown {
            color: #dc0000;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }
        .btn-copy {
            background-color: #1e88e5;
        }
        .btn-copy:hover {
            background-color: #1565c0;
        }
        .btn-refresh {
            background-color: #388e3c;
        }
        .btn-refresh:hover {
            background-color: #27662c;
        }
        .tip {
            margin-top: 25px;
            font-size: 14px;
            color: #999;
            line-height: 1.5;
        }
        .toast {
            position: fixed;
            top: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
        @media (max-width: 480px) {
            .dynamic-code {
                font-size: 40px;
                letter-spacing: 4px;
            }
            .btn {
                min-width: 100px;
                padding: 10px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">韵达动态码生成器</div>
        <div class="code-box">
            <div class="dynamic-code" id="dynamicCode">862915</div>
            <div class="expire">动态码将在 <span class="countdown" id="countdown">60</span> 秒后过期</div>
        </div>
        <div class="btn-group">
            <button class="btn btn-copy" onclick="copyCode()">复制动态码</button>
            <button class="btn btn-refresh" onclick="refreshCode()">刷新动态码</button>
        </div>
        <div class="tip">注：此工具仅管理员专用，动态码每60秒自动刷新一次</div>
        <div class="toast" id="toast">复制成功！</div>
    </div>

    <script>
        let countdownTimer;
        let countdown = 60;
        const codeElement = document.getElementById('dynamicCode');
        const countdownElement = document.getElementById('countdown');
        const toastElement = document.getElementById('toast');

        // 生成随机6位动态码
        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // 刷新动态码
        function refreshCode() {
            clearInterval(countdownTimer);
            countdown = 60;
            countdownElement.textContent = countdown;
            codeElement.textContent = generateCode();
            startCountdown();
        }

        // 复制动态码
        function copyCode() {
            const code = codeElement.textContent;
            navigator.clipboard.writeText(code).then(() => {
                toastElement.style.display = 'block';
                setTimeout(() => {
                    toastElement.style.display = 'none';
                }, 1500);
            });
        }

        // 倒计时函数
        function startCountdown() {
            countdownTimer = setInterval(() => {
                countdown--;
                countdownElement.textContent = countdown;
                if (countdown <= 0) {
                    refreshCode();
                }
            }, 1000);
        }

        // 页面加载初始化
        window.onload = function() {
            codeElement.textContent = generateCode();
            startCountdown();
        };
    </script>
</body>
</html>
